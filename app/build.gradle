plugins {
    alias(libs.plugins.android.application)

    // Firebase (Clase 09.1 / BaaS): procesa app/google-services.json e inicializa FirebaseApp.
    id 'com.google.gms.google-services'
}

android {
    namespace 'com.example.bitbusters'
    compileSdk {
        version = release(36) {
            minorApiLevel = 1
        }
    }

    defaultConfig {
        applicationId "com.example.bitbusters"
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    buildFeatures {
        viewBinding = true
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation libs.appcompat
    implementation libs.material
    implementation libs.activity
    implementation libs.constraintlayout
    implementation libs.recyclerview
    testImplementation libs.junit
    androidTestImplementation libs.ext.junit
    androidTestImplementation libs.espresso.core
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.cardview:cardview:1.0.0'
    implementation 'de.hdodenhof:circleimageview:3.1.0'  // para fotos circulares
    implementation 'com.github.bumptech.glide:glide:4.16.0'
    implementation 'com.google.android.gms:play-services-maps:18.2.0'
    implementation 'com.google.code.gson:gson:2.10.1'

    // Room Database (Clase 07 Extra)
    implementation 'androidx.room:room-runtime:2.6.1'
    annotationProcessor 'androidx.room:room-compiler:2.6.1'

    // WorkManager (Clase 04.1)
    implementation 'androidx.work:work-runtime:2.9.0'

    // ViewPager2 + Fragments (Clase 06.1)
    implementation 'androidx.viewpager2:viewpager2:1.0.0'
    implementation 'androidx.fragment:fragment:1.6.2'

    // Navigation Component (Clase 06.2)
    implementation 'androidx.navigation:navigation-fragment:2.7.7'
    implementation 'androidx.navigation:navigation-ui:2.7.7'

    // Retrofit + OkHttp (Clase 04.2)
    implementation 'com.squareup.retrofit2:retrofit:2.9.0'
    implementation 'com.squareup.retrofit2:converter-gson:2.9.0'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.squareup.okhttp3:logging-interceptor:4.12.0'

    // ── Firebase BaaS (Clase 09.1 / 09.2 / 10) ──────────────────────────────
    // El BoM (Bill of Materials) fija versiones compatibles entre sí; no se
    // especifica versión en cada artefacto individual.
    implementation platform('com.google.firebase:firebase-bom:33.1.0')
    // Firebase Authentication (Clase 10): login/registro con email+password,
    // FirebaseAuth.getCurrentUser(), etc. — reemplaza la validación hardcodeada
    // de LoginActivity.
    implementation 'com.google.firebase:firebase-auth'
    // Cloud Firestore (Clase 09.2): backend para ChatRepository/FirestoreChatRepository,
    // citas, separaciones, etc.
    implementation 'com.google.firebase:firebase-firestore'

}

